<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">

  <!-- connections -->
  <line x1="180" y1="0"   x2="200" y2="95"  stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="500" y1="0"   x2="530" y2="140" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="0"   y1="150" x2="80"  y2="270" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="0"   y1="150" x2="200" y2="95"  stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="800" y1="150" x2="660" y2="300" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="200" y1="95"  x2="370" y2="230" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="530" y1="140" x2="370" y2="230" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="530" y1="140" x2="660" y2="300" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="80"  y1="270" x2="170" y2="420" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="370" y1="230" x2="450" y2="410" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="0"   y1="500" x2="170" y2="420" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="170" y1="420" x2="280" y2="560" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="450" y1="410" x2="610" y2="530" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="450" y1="410" x2="280" y2="560" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="610" y1="530" x2="800" y2="500" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="800" y1="500" x2="730" y2="680" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="280" y1="560" x2="110" y2="680" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="280" y1="560" x2="490" y2="660" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="610" y1="530" x2="490" y2="660" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="490" y1="660" x2="730" y2="680" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="110" y1="680" x2="180" y2="800" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>
  <line x1="490" y1="660" x2="500" y2="800" stroke="#2337ff" stroke-opacity="0.16" stroke-width="1"/>

  <!-- squares = servers -->
  <rect x="196" y="91"  width="8" height="8" fill="#2337ff" fill-opacity="0.3" rx="1.5"/>
  <rect x="76"  y="266" width="8" height="8" fill="#2337ff" fill-opacity="0.3" rx="1.5"/>
  <rect x="656" y="296" width="8" height="8" fill="#2337ff" fill-opacity="0.3" rx="1.5"/>
  <rect x="446" y="406" width="8" height="8" fill="#2337ff" fill-opacity="0.3" rx="1.5"/>
  <rect x="606" y="526" width="8" height="8" fill="#2337ff" fill-opacity="0.3" rx="1.5"/>
  <rect x="486" y="656" width="8" height="8" fill="#2337ff" fill-opacity="0.3" rx="1.5"/>

  <!-- circles = clients (internal) -->
  <circle cx="530" cy="140" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="370" cy="230" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="170" cy="420" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="280" cy="560" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="110" cy="680" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="730" cy="680" r="3" fill="#2337ff" fill-opacity="0.24"/>

  <!-- edge nodes — mirrored on opposite sides for seamless tiling -->
  <circle cx="180" cy="0"   r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="500" cy="0"   r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="0"   cy="150" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="800" cy="150" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="0"   cy="500" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="800" cy="500" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="180" cy="800" r="3" fill="#2337ff" fill-opacity="0.24"/>
  <circle cx="500" cy="800" r="3" fill="#2337ff" fill-opacity="0.24"/>

</svg>
